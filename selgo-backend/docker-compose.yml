# selgo-backend/docker-compose.yml (Updated)
version: '3.8'

services:
  # Auth Service
  auth-service:
    build: 
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: selgo-auth-service
    ports:
      - "8001:8001"
    volumes:
      - ./auth-service:/app
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=selgo_auth
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - ENVIRONMENT=development
      - SECRET_KEY=your-super-secret-key-change-this
    depends_on:
      - postgres
    networks:
      - selgo-network
    command: uvicorn src.app:app --host 0.0.0.0 --port 8001 --reload

  # Boat Service
  boat-service:
    build: 
      context: ./boat-service
      dockerfile: Dockerfile
    container_name: selgo-boat-service
    ports:
      - "8000:8000"
    volumes:
      - ./boat-service:/app
      - ./boat-service/uploads:/app/uploads
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=selgo_boat
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=development
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      - postgres
      - auth-service
    networks:
      - selgo-network
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  # Job Service
